<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Notify — FCM Inbox</title>

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link
			href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;1,300&family=IBM+Plex+Sans:wght@300;400;500&display=swap"
			rel="stylesheet" />

		<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
		<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-messaging-compat.js"></script>
		<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>

		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<div class="app">
			<div id="login-screen" class="screen active">
				<div class="brand">
					<div class="brand-icon">📬</div>
					<span class="brand-name">Notify</span>
				</div>

				<div class="card">
					<h1 class="card-title">Sign in</h1>

					<label class="field-label" for="username-input"
						>Username</label
					>
					<input
						type="text"
						id="username-input"
						placeholder="e.g. ashraf"
						autocomplete="off"
						autocapitalize="off"
						spellcheck="false" />

					<div id="permission-warn" class="perm-warn">
						⚠ Notification permission is blocked. Open your
						browser's site settings, allow notifications for this
						page, then try again.
					</div>

					<button
						class="btn btn-primary"
						id="login-btn"
						onclick="handleLogin()">
						Login &amp; Subscribe
						<span>→</span>
					</button>

					<p id="login-status" class="status-msg"></p>
				</div>
			</div>

			<div id="inbox-screen" class="screen">
				<div class="brand">
					<div class="brand-icon">📬</div>
					<span class="brand-name">Notify</span>
				</div>

				<nav class="navbar">
					<span class="nav-tab active">📥 Inbox</span>
					<a class="nav-tab" href="history.html">📋 History</a>
				</nav>

				<div class="inbox-top">
					<div class="inbox-user-info">
						<div class="inbox-greeting">Logged in as</div>
						<div class="inbox-username" id="display-username"></div>
						<div class="topic-pill">
							<span class="dot"></span>
							<span id="topic-badge">subscribed</span>
						</div>
					</div>
					<button class="btn btn-ghost" onclick="handleLogout()">
						Logout
					</button>
				</div>

				<div class="inbox-section-head">
					<span class="inbox-section-title">Inbox</span>
					<span class="inbox-count" id="inbox-count">—</span>
				</div>

				<div class="notif-list" id="notifications-list">
					<div class="loading-state">
						Listening for notifications<span
							class="ellipsis"></span>
					</div>
				</div>
			</div>
		</div>

		<script src="config.js"></script>
		<script src="app.js"></script>
	</body>
</html>
